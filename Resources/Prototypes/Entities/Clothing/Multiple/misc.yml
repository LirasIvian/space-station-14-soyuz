- type: entity
  parent: Clothing
  id: ClothingMultipleHeadphones
  name: headphones
  description: Quality headphones from Drunk Masters, with good sound insulation.
  components:
  - type: Sprite
    sprite: Clothing/Multiple/headphones.rsi
    layers:
    - state: icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    equippedPrefix: off
    sprite: Clothing/Multiple/headphones.rsi
    slots:
    - HEAD
    - EARS
    - NECK
  - type: Instrument # DS14
    allowPercussion: true
    allowProgramChange: true
    program: 0
  - type: HeadphonesInstrument # DS14
  - type: UserInterface # DS14
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
  - type: ActivatableUI # DS14
    key: enum.InstrumentUiKey.Key
  - type: ToggleableVisuals
    spriteLayer: enum.ToggleableVisuals.Layer
    clothingVisuals:
      head:
      - state: on-equipped-HELMET
      ears:
      - state: on-equipped-EARS
      neck:
      - state: on-equipped-NECK
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: icon-on}
          False: {state: icon}
  - type: ItemToggle
    predictable: false
    onActivate: false # DS14
    soundActivate:
      path: /Audio/Items/flashlight_on.ogg
    soundDeactivate:
      path: /Audio/Items/flashlight_off.ogg
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/headset/headset_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/headset/headset_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/headset/headset_drop.ogg
  #DS14-End