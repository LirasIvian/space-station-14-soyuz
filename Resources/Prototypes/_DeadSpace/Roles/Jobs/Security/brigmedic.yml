- type: job
  id: Brigmedic
  name: job-name-brigmedic
  description: job-description-brigmedic
  playTimeTracker: JobBrigmedic
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 28800 # 8 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 28800 # 8 hours
  startingGear: BrigmedicGear
  icon: "JobIconBrigmedic"
  supervisors: job-supervisors-hos
  canBeAntag: false
  access:
  - Medical
  - Security
  - Brigmedic
  - Brig
  - Maintenance
  - External
  #start-backmen: currency
  minBankBalance: 250 # DS14-value
  maxBankBalance: 350 # DS14-value
  wageDepartment: Security
  wage: 200 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
    # DS14-Start
    - type: Skill
      group: Medical
    # DS14-End
#DS14-Soyuz-end
  ranks:
    SGMRankSeniorSergeant:
    - !type:RoleTimeRequirement
      role: JobBrigmedic
      time: 360000 # 100 часов
    SGMRankSergeant:
    - !type:RoleTimeRequirement
      role: JobBrigmedic
      time: 180000 # 50 часов
    SGMRankJuniorSergeant:
    - !type:RoleTimeRequirement
      role: JobBrigmedic
      time: 90000 # 25 часов
    SGMRankPrivate: []
#DS14-Soyuz-end

