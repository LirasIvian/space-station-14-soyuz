- type: job
  id: SecurityPilot
  name: job-name-security-pilot
  description: job-description-security-pilot
  playTimeTracker: JobSecurityPilot
  requirements:
    - !type:DepartmentTimeRequirement
      department: Security
      time: 36000 # 10 hours
    - !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 7200 # 2 hours
  startingGear: SecurityPilotGear
  icon: "JobIconSecurityPilot"
  supervisors: job-supervisors-hos-and-senior-officer
  canBeAntag: false
  access:
  - Security
  - Brig
  - Maintenance
  - Service
  - External
  - Cryogenics
  #start-backmen: currency
  minBankBalance: 250 # DS14-value
  maxBankBalance: 350 # DS14-value
  wageDepartment: Security
  wage: 200 # DS14-value
  #end-backmen: currency
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
    # DS14-Start
    - type: Skill
      group: BasicAndShuttleControl
    # DS14-End
#DS14-Soyuz-end
  ranks:
    SGMRankSeniorSergeant:
    - !type:RoleTimeRequirement
      role: JobSecurityPilot
      time: 360000 # 100 часов
    SGMRankSergeant:
    - !type:RoleTimeRequirement
      role: JobSecurityPilot
      time: 180000 # 50 часов
    SGMRankJuniorSergeant:
    - !type:RoleTimeRequirement
      role: JobSecurityPilot
      time: 90000 # 25 часов
    SGMRankPrivate: []
#DS14-Soyuz-end

- type: startingGear
  id: SecurityPilotGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: SecurityPilotPDA
    ears: ClothingHeadsetSecurity
  storage:
    back:
    - Flash
    - ERTloadoutSecuritySecondary # DS14

- type: chameleonOutfit
  id: SecurityPilotChameleonOutfit
  job: SecurityPilot
  equipment:
    eyes: ClothingEyesGlassesSecurity
    head: ClothingHeadHatBeretSecurity
    outerClothing: ClothingOuterWinterSec
    ears: ClothingHeadsetSecurity
