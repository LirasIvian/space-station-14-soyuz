- type: entity
  id: FullFlagOPZ
  parent: BaseStructure
  name: Флаг ОПЗ
  suffix: На шесте
  description: Олицетворяет собой государство, чья гегемония перекроила карту галактики благодаря военной и политической силе.
  components:
  - type: Sprite
    noRot: true
    sprite: _DeadSpace/Structures/Decoration/full_flags.rsi
    state: opz
    drawdepth: Mobs
    offset: "0.0,0.5"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.06,-0.4,0.06,0.9"
        density: 190
        hard: true
        mask:
        - MachineMask
        layer:
        - MachineLayer

