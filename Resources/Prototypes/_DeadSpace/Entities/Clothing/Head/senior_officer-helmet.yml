- type: entity
  parent: ClothingHeadHelmetHardsuitSecurity
  id: ClothingHeadHelmetHardsuitSeniorOfficer
  categories: [ HideSpawnMenu ]
  name: шлем скафандра страшего милиционера
  description: Шлем скафандра старшего милиционера, на лицевой части шлема есть четыре ярко голубых визора, что словно смотрят вам в душу?
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Head/Hardsuits/senior_officer.rsi
    #DS14-Soyuz-start
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-light-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-light-reptilian
        shader: unshaded
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-vulpkanin
      - state: equipped-head-unshaded-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-reptilian
      - state: equipped-head-unshaded-reptilian
        shader: unshaded
  - type: PointLight
    color: '#fce883'
    radius: 6
    energy: 3
#DS14-Soyuz-end
