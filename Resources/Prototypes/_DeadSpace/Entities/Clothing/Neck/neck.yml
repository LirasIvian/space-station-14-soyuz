- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckMantleMaid
  name: мантия горничной
  description: Это классический элемент гардероба, предназначенный для использования в сфере обслуживания в гостиничном или домашнем хозяйстве.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Neck/neck_maid.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Neck/neck_maid.rsi

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckPronMaid
  name: фартук горничной
  description: Этот фартук горничной – воплощение элегантности и порядка. Изготовленный из легкого материала, он обладает изысканными кружевными вставками, подчеркивающими нежность образа. Фартук идеально дополняет стиль горничной, придавая ей непринужденный и ухоженный вид.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Neck/pron_maid.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Neck/pron_maid.rsi

- type: entity
  parent: [ClothingNeckBase, BaseCommandContraband]
  id: ClothingNeckMantleBlueShieldhoulder
  name: наплечная мантия оперативника КГБ
  description: Эта мантия является символом преданности к делу защиты глав станции.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Neck/blueshieldmantle_shoulder.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Neck/blueshieldmantle_shoulder.rsi

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCloakCommunicationsOfficer
  name: наплечная мантия офицера телекоммуникаций
  description: Шёлковая мантия багрового цвета. Выглядит одновременно роскошно и зловеще.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Neck/comantle.rsi
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckMantleTechnicalOperationsSupervisor
  name: мантия руководителя техобеспечения
  description: Строгая мантия с кроваво-красными элементами и золотой окаймовкой.
  components:
  - type: Sprite
    sprite: _DeadSpace/Clothing/Neck/technical_supervisormantle.rsi
  - type: Clothing
    sprite: _DeadSpace/Clothing/Neck/technical_supervisormantle.rsi
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

