  name: КапитаноШкаф
  description: Вай, мама-джан, что тут за одежда такая превосходная.
  components:
  - type: VendingMachine
    pack: CaptainDrobeInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Structures/Machines/VendingMachines/captaindrobe.rsi
