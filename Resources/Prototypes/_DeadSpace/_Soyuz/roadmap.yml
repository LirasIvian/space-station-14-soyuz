# Order задает приоритет в списке. Если order будет 1, задача будет в самом верху списка.
# Все новые задачи делайте с order на 1 больше, чем в предыдущей. Если в предыдущей InProgress задачке order 4, то в вашей будет order 5
# Теги ставьте максимально близкие по значению к задачке, строгих лимитов нет
# Категории делятся на Completed, InProgress, Planned = Выполнено, в процессе, запланированно
# Старайтесь не делать больших описаний, если этого не требует сама задача


